<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 20px;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-bottom: 30px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
}

/* GRÁFICOS */
.graficos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 30px;
}

canvas {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
}

/* SEÇÕES */
.section {
    margin-bottom: 30px;
}

/* RANKING */
#ranking div {
    background: #1e293b;
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
}

/* HISTÓRICO */
.lista {
    background: #1e293b;
    border-radius: 10px;
    padding: 10px;
    max-height: 250px;
    overflow-y: auto;
}

.lista div {
    padding: 6px;
    border-bottom: 1px solid #334155;
    font-size: 14px;
}

.grafico-box {
    height: 250px; /* 👈 AJUSTA AQUI */
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

    <div class="header">
        <h1>📊 Dashboard de Ocorrências</h1>
        <input type="date" id="filtroData">
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3>Total</h3>
            <p id="total">0</p>
        </div>

        <div class="card">
            <h3>Taxa / hora</h3>
            <p id="taxa">0</p>
        </div>

        <div class="card">
            <h3>Tempo Médio</h3>
            <p id="tempo">0 min</p>
        </div>

        <div class="card">
            <h3>Status</h3>
            <p id="status">OK</p>
        </div>
    </div>

        <!-- GRÁFICOS -->
    <div class="graficos">
        <div class="grafico-box">
            <canvas id="grafico"></canvas>
        </div>

        <div class="grafico-box">
            <canvas id="graficoProdutos"></canvas>
        </div>
    </div>

    <!-- RANKING -->
    <div class="section">
        <h2>📊 Frequência por Produto</h2>
        <div id="ranking"></div>
    </div>

    <!-- HISTÓRICO -->
    <div class="section">
        <h2>📋 Histórico</h2>
        <div class="lista" id="lista"></div>
    </div>

</div>

<script>
let chart
let chartProdutos

function filtrarPorData(dados, dataSelecionada) {
    return dados.filter(o => o.timestamp.startsWith(dataSelecionada))
}

function agruparPorHora(dados) {
    const mapa = {}

    dados.forEach(o => {
        const hora = new Date(o.timestamp).getHours()
        mapa[hora] = (mapa[hora] || 0) + 1
    })

    return {
        labels: Object.keys(mapa),
        valores: Object.values(mapa)
    }
}

function calcularTempoMedio(dados) {
    if (dados.length < 2) return 0

    let total = 0

    for (let i = 1; i < dados.length; i++) {
        const t1 = new Date(dados[i-1].timestamp)
        const t2 = new Date(dados[i].timestamp)
        total += (t2 - t1)
    }

    return (total / (dados.length - 1)) / 60000
}

function calcularTaxa(dados) {
    if (dados.length === 0) return 0

    const primeiro = new Date(dados[0].timestamp)
    const ultimo = new Date(dados[dados.length - 1].timestamp)

    const horas = (ultimo - primeiro) / 3600000

    return horas > 0 ? (dados.length / horas).toFixed(2) : dados.length
}

function verificarInatividade(dados) {
    if (dados.length === 0) return "SEM DADOS"

    const ultimo = new Date(dados[dados.length - 1].timestamp)
    const agora = new Date()

    const minutos = (agora - ultimo) / 60000

    if (minutos > 10) return "🔴 PARADO"
    if (minutos > 5) return "🟡 ATENÇÃO"
    return "🟢 OK"
}

function contarProdutos(dados) {
    const mapa = {}

    dados.forEach(o => {
        const p = o.produto || "Desconhecido"
        mapa[p] = (mapa[p] || 0) + 1
    })

    return Object.entries(mapa)
        .sort((a, b) => b[1] - a[1])
}

async function carregar() {
    const res = await fetch("http://127.0.0.1:8000/ocorrencias")
    const data = await res.json()

    const dataSelecionada = document.getElementById("filtroData").value ||
        new Date().toISOString().slice(0,10)

    const filtrado = filtrarPorData(data, dataSelecionada)

    document.getElementById("total").innerText = filtrado.length
    document.getElementById("tempo").innerText = calcularTempoMedio(filtrado).toFixed(1) + " min"
    document.getElementById("taxa").innerText = calcularTaxa(filtrado)
    document.getElementById("status").innerText = verificarInatividade(filtrado)

    // HISTÓRICO
    const lista = document.getElementById("lista")
    lista.innerHTML = ""

    filtrado.slice().reverse().forEach(o => {
        const div = document.createElement("div")
        div.innerText = `${o.timestamp.slice(11,16)} | ${o.produto} | ${o.endereco}`
        lista.appendChild(div)
    })

    // GRÁFICO HORAS
    const { labels, valores } = agruparPorHora(filtrado)

    if (chart) chart.destroy()

    chart = new Chart(document.getElementById("grafico"), {
        type: "bar",
        data: {
            labels,
            datasets: [{
                label: "Ocorrências por Hora",
                data: valores
            }]
        }
    })

    // 🔥 PRODUTOS
    const produtos = contarProdutos(filtrado)

    const top5 = produtos.slice(0, 5)
    const labelsProd = top5.map(p => p[0])
    const valoresProd = top5.map(p => p[1])

    if (chartProdutos) chartProdutos.destroy()

    chartProdutos = new Chart(document.getElementById("graficoProdutos"), {
        type: "bar",
        data: {
            labels: labelsProd,
            datasets: [{
                label: "Top Produtos",
                data: valoresProd
            }]

        }

    })

    // RANKING
    const ranking = document.getElementById("ranking")
    ranking.innerHTML = ""

    produtos.forEach(([nome, qtd]) => {
        const div = document.createElement("div")
        div.innerText = `${nome} → ${qtd}x`
        ranking.appendChild(div)
    })
}

// carregar ao abrir
carregar()

// atualizar ao mudar data
document.getElementById("filtroData").addEventListener("change", carregar)
</script>

</body>
</html>
